<!DOCTYPE html>
<html lang="fa" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>سامانه فاکتور فروشگاهی</title>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/html2pdf.js/0.10.1/html2pdf.bundle.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/html2canvas/1.4.1/html2canvas.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Tahoma', 'Arial', sans-serif;
            background: #f5f5f5;
            direction: rtl;
            min-height: 100vh;
            overflow-x: hidden;
        }

        .login-overlay {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0, 0, 0, 0.7);
            display: flex;
            justify-content: center;
            align-items: center;
            z-index: 1000;
            backdrop-filter: blur(5px);
        }

        .login-box {
            background: white;
            padding: 40px;
            border-radius: 20px;
            box-shadow: 0 20px 60px rgba(0, 0, 0, 0.3);
            text-align: center;
            width: 90%;
            max-width: 400px;
            animation: slideUp 0.5s ease;
        }

        @keyframes slideUp {
            from { transform: translateY(50px); opacity: 0; }
            to { transform: translateY(0); opacity: 1; }
        }

        @keyframes fadeInOut {
            0% { opacity: 0; transform: translateY(-20px); }
            20% { opacity: 1; transform: translateY(0); }
            80% { opacity: 1; transform: translateY(0); }
            100% { opacity: 0; transform: translateY(-20px); }
        }

        .login-box h2 {
            margin-bottom: 20px;
            color: #2c3e50;
        }

        .login-box input {
            width: 100%;
            padding: 12px;
            margin: 10px 0;
            border: 2px solid #ddd;
            border-radius: 8px;
            font-size: 16px;
            transition: border-color 0.3s;
        }

        .login-box input:focus {
            outline: none;
            border-color: #3498db;
        }

        .login-box button {
            width: 100%;
            padding: 12px;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
            border: none;
            border-radius: 8px;
            font-size: 18px;
            cursor: pointer;
            margin-top: 10px;
            transition: transform 0.2s;
        }

        .login-box button:hover {
            transform: scale(1.05);
        }

        .main-container {
            display: none;
            min-height: 100vh;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            padding: 20px;
        }

        .welcome-message {
            background: rgba(255, 255, 255, 0.9);
            color: #2c3e50;
            padding: 15px 30px;
            border-radius: 50px;
            text-align: center;
            margin: 20px auto;
            max-width: 500px;
            box-shadow: 0 10px 30px rgba(0, 0, 0, 0.2);
            animation: fadeInOut 2s ease forwards;
        }

        .header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 20px;
            max-width: 1200px;
            margin: 0 auto;
        }

        .shop-icon {
            width: 60px;
            height: 60px;
            border-radius: 50%;
            background: white;
            display: flex;
            align-items: center;
            justify-content: center;
            cursor: pointer;
            box-shadow: 0 8px 25px rgba(0, 0, 0, 0.2);
            transition: all 0.3s;
            font-size: 30px;
        }

        .shop-icon:hover {
            transform: scale(1.1);
            box-shadow: 0 12px 35px rgba(0, 0, 0, 0.3);
        }

        .menu-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(250px, 1fr));
            gap: 30px;
            max-width: 800px;
            margin: 50px auto;
            padding: 20px;
        }

        .menu-item {
            background: white;
            padding: 40px;
            border-radius: 20px;
            text-align: center;
            cursor: pointer;
            box-shadow: 0 10px 30px rgba(0, 0, 0, 0.1);
            transition: all 0.3s;
        }

        .menu-item:hover {
            transform: translateY(-10px);
            box-shadow: 0 20px 40px rgba(0, 0, 0, 0.2);
        }

        .menu-icon {
            font-size: 60px;
            margin-bottom: 15px;
        }

        .menu-item h3 {
            color: #2c3e50;
            font-size: 20px;
        }

        .modal-overlay {
            display: none;
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0, 0, 0, 0.8);
            z-index: 999;
            backdrop-filter: blur(10px);
            justify-content: center;
            align-items: center;
        }

        .modal-overlay.active {
            display: flex;
        }

        .modal-box {
            background: white;
            padding: 40px;
            border-radius: 20px;
            box-shadow: 0 20px 60px rgba(0, 0, 0, 0.3);
            width: 90%;
            max-width: 500px;
            position: relative;
        }

        .back-button {
            position: absolute;
            top: 20px;
            right: 20px;
            background: #e74c3c;
            color: white;
            border: none;
            padding: 10px 20px;
            border-radius: 8px;
            cursor: pointer;
            font-size: 16px;
            transition: background 0.3s;
        }

        .back-button:hover {
            background: #c0392b;
        }

        .shop-name-display {
            text-align: center;
            font-size: 28px;
            color: #2c3e50;
            margin: 40px 0;
            padding: 20px;
            background: #f8f9fa;
            border-radius: 10px;
        }

        .invoice-page {
            display: none;
            padding: 20px;
            max-width: 900px;
            margin: 0 auto;
        }

        .invoice-form {
            background: white;
            padding: 30px;
            border-radius: 20px;
            box-shadow: 0 10px 30px rgba(0, 0, 0, 0.1);
        }

        .form-group {
            margin-bottom: 20px;
        }

        .form-group label {
            display: block;
            margin-bottom: 5px;
            color: #2c3e50;
            font-weight: bold;
        }

        .input-with-button {
            display: flex;
            gap: 10px;
            align-items: center;
        }

        .input-with-button input {
            flex: 1;
        }

        .generate-btn {
            background: #3498db;
            color: white;
            border: none;
            padding: 10px 15px;
            border-radius: 8px;
            cursor: pointer;
            font-size: 14px;
            transition: background 0.3s;
            white-space: nowrap;
        }

        .generate-btn:hover {
            background: #2980b9;
        }

        .delete-btn {
            background: #e74c3c;
            color: white;
            border: none;
            padding: 8px 12px;
            border-radius: 8px;
            cursor: pointer;
            font-size: 14px;
            transition: background 0.3s;
        }

        .delete-btn:hover {
            background: #c0392b;
        }

        .add-product-btn {
            background: #27ae60;
            color: white;
            border: none;
            padding: 12px 24px;
            border-radius: 8px;
            cursor: pointer;
            font-size: 16px;
            margin: 15px 0;
            transition: background 0.3s;
            width: 100%;
        }

        .add-product-btn:hover {
            background: #219a52;
        }

        input, select {
            width: 100%;
            padding: 12px;
            border: 2px solid #ddd;
            border-radius: 8px;
            font-size: 16px;
            transition: border-color 0.3s;
        }

        input:focus {
            outline: none;
            border-color: #3498db;
        }

        .date-group {
            display: flex;
            gap: 10px;
        }

        .date-group input {
            flex: 1;
        }

        .product-row {
            display: flex;
            gap: 10px;
            align-items: end;
            margin-bottom: 15px;
            padding: 15px;
            background: #f8f9fa;
            border-radius: 12px;
            border: 2px solid #e9ecef;
            transition: all 0.3s;
        }

        .product-row:hover {
            border-color: #3498db;
            box-shadow: 0 5px 15px rgba(0,0,0,0.05);
        }

        .product-row .form-group {
            margin-bottom: 0;
            flex: 1;
        }

        .product-row .delete-btn {
            margin-bottom: 0;
            height: 48px;
        }

        .toggle-container {
            display: flex;
            align-items: center;
            justify-content: space-between;
            background: #f8f9fa;
            padding: 15px;
            border-radius: 12px;
            margin: 20px 0;
        }

        .toggle-label {
            font-weight: bold;
            color: #2c3e50;
        }

        .ios-toggle {
            position: relative;
            width: 60px;
            height: 34px;
            display: inline-block;
        }

        .ios-toggle input {
            opacity: 0;
            width: 0;
            height: 0;
        }

        .slider {
            position: absolute;
            cursor: pointer;
            top: 0;
            left: 0;
            right: 0;
            bottom: 0;
            background-color: #ccc;
            transition: 0.4s;
            border-radius: 34px;
        }

        .slider:before {
            position: absolute;
            content: "";
            height: 26px;
            width: 26px;
            left: 4px;
            bottom: 4px;
            background-color: white;
            transition: 0.4s;
            border-radius: 50%;
        }

        input:checked+.slider {
            background-color: #2ecc71;
        }

        input:checked+.slider:before {
            transform: translateX(26px);
        }

        .submit-btn {
            width: 100%;
            padding: 15px;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
            border: none;
            border-radius: 12px;
            font-size: 20px;
            cursor: pointer;
            margin-top: 20px;
            transition: transform 0.2s;
        }

        .submit-btn:hover {
            transform: scale(1.02);
        }

        .back-to-main {
            background: #e74c3c;
            color: white;
            border: none;
            padding: 10px 20px;
            border-radius: 8px;
            cursor: pointer;
            font-size: 16px;
            margin-bottom: 20px;
        }

        /* استایل رسید - بهبود یافته برای PDF */
        #invoice-receipt {
            display: block;
            background: #ffffff !important;
            padding: 30px;
            width: 100%;
            max-width: 500px;
            margin: 30px auto;
            font-family: 'Tahoma', 'Arial', sans-serif;
            direction: rtl;
            border: 3px solid #000000;
            color: #000000 !important;
            position: relative;
            box-shadow: none;
        }

        #invoice-receipt * {
            color: #000000 !important;
        }

        .receipt-header {
            text-align: center;
            border-bottom: 3px solid #000000;
            padding-bottom: 20px;
            margin-bottom: 20px;
        }

        .receipt-header h2 {
            font-size: 26px;
            margin-bottom: 10px;
            color: #000000 !important;
            font-weight: bold;
        }

        .receipt-header .phone {
            font-size: 18px;
            color: #000000 !important;
            margin-top: 5px;
            font-weight: bold;
        }

        .info-table {
            width: 100%;
            border-collapse: collapse;
            margin-bottom: 20px;
        }

        .info-table td {
            padding: 12px 8px;
            border-bottom: 2px solid #000000;
            font-size: 16px;
            color: #000000 !important;
        }

        .info-table td:first-child {
            font-weight: bold;
            width: 40%;
            text-align: right;
            background: #f0f0f0;
            padding-right: 10px;
        }

        .info-table td:last-child {
            text-align: left;
            direction: ltr;
            padding-left: 10px;
        }

        .products-table {
            width: 100%;
            border-collapse: collapse;
            margin: 20px 0;
        }

        .products-table th {
            background: #000000;
            color: #ffffff !important;
            padding: 12px 8px;
            font-size: 15px;
            border: 2px solid #000000;
            text-align: center;
        }

        .products-table td {
            padding: 10px 8px;
            font-size: 15px;
            border: 2px solid #000000;
            text-align: center;
            background: #ffffff;
        }

        .products-table tr:nth-child(even) td {
            background: #f9f9f9;
        }

        .receipt-total {
            text-align: center;
            font-size: 22px;
            font-weight: bold;
            margin-top: 25px;
            padding: 20px;
            background: #000000;
            color: #ffffff !important;
            border: 3px solid #000000;
            border-radius: 5px;
        }

        .receipt-total span {
            color: #ffffff !important;
            font-size: 24px;
        }

        .receipt-footer {
            text-align: center;
            margin-top: 25px;
            padding-top: 15px;
            border-top: 2px solid #000000;
            font-size: 14px;
            color: #000000 !important;
        }
    </style>
</head>
<body>

    <!-- لاگین -->
    <div class="login-overlay" id="loginOverlay">
        <div class="login-box">
            <h2>🔐 ورود به سیستم</h2>
            <p style="color: #7f8c8d; margin-bottom: 20px;">لطفاً اطلاعات فروشگاه را وارد کنید</p>
            <input type="text" id="shopNameInput" placeholder="نام فروشگاه">
            <input type="tel" id="shopPhoneInput" placeholder="شماره تماس فروشگاه">
            <button onclick="login()">ورود به حساب</button>
        </div>
    </div>

    <!-- صفحه اصلی -->
    <div class="main-container" id="mainContainer">
        <div class="welcome-message" id="welcomeMsg"></div>
        <div class="header">
            <div></div>
            <div class="shop-icon" onclick="openShopInfo()" title="اطلاعات فروشگاه">🏪</div>
        </div>
        <div class="menu-grid">
            <div class="menu-item" onclick="openInvoicePage()">
                <div class="menu-icon">🧾</div>
                <h3>ساخت فاکتور</h3>
                <p style="color: #7f8c8d; margin-top: 10px;">ایجاد فاکتور جدید با چند محصول</p>
            </div>
        </div>
    </div>

    <!-- مودال اطلاعات فروشگاه -->
    <div class="modal-overlay" id="shopInfoModal">
        <div class="modal-box">
            <button class="back-button" onclick="closeShopInfo()">بازگشت</button>
            <h2 style="text-align: center; color: #2c3e50;">📋 اطلاعات فروشگاه</h2>
            <div class="shop-name-display" id="shopNameDisplay"></div>
            <p style="text-align: center; color: #7f8c8d;">شماره تماس: <span id="shopPhoneDisplay"></span></p>
        </div>
    </div>

    <!-- صفحه فاکتور -->
    <div class="invoice-page" id="invoicePage">
        <button class="back-to-main" onclick="backToMain()">⬅ بازگشت به صفحه اصلی</button>

        <div class="invoice-form">
            <h2 style="text-align: center; color: #2c3e50; margin-bottom: 30px;">🧾 ایجاد فاکتور جدید</h2>

            <div style="border: 2px solid #e9ecef; border-radius: 12px; padding: 20px; margin-bottom: 25px;">
                <h3 style="color: #2c3e50; margin-bottom: 20px;">📦 محصولات</h3>
                <div id="productsContainer"></div>
                <button class="add-product-btn" onclick="addProduct()">➕ افزودن محصول جدید</button>
            </div>

            <div class="form-group">
                <label>شماره فاکتور (۵ رقمی)</label>
                <div class="input-with-button">
                    <input type="text" id="invoiceNumber" placeholder="شماره ۵ رقمی" inputmode="numeric" maxlength="5" 
                           onkeypress="return onlyNumbers(event)" 
                           oninput="this.value = this.value.replace(/[^0-9]/g, '').slice(0, 5)">
                    <button class="generate-btn" onclick="generateInvoiceNumber()">🎲 ساخت</button>
                </div>
            </div>

            <div class="form-group">
                <label>شماره سفارش (۶ رقمی)</label>
                <div class="input-with-button">
                    <input type="text" id="orderNumber" placeholder="شماره ۶ رقمی" inputmode="numeric" maxlength="6" 
                           onkeypress="return onlyNumbers(event)" 
                           oninput="this.value = this.value.replace(/[^0-9]/g, '').slice(0, 6)">
                    <button class="generate-btn" onclick="generateOrderNumber()">🎲 ساخت</button>
                </div>
            </div>

            <div class="form-group">
                <label>تاریخ خرید</label>
                <div class="date-group">
                    <input type="text" id="yearInput" placeholder="سال" inputmode="numeric" maxlength="4" 
                           onkeypress="return onlyNumbers(event)" 
                           oninput="this.value = this.value.replace(/[^0-9]/g, '').slice(0, 4)">
                    <input type="text" id="monthInput" placeholder="ماه" inputmode="numeric" maxlength="2" 
                           onkeypress="return onlyNumbers(event)" 
                           oninput="this.value = this.value.replace(/[^0-9]/g, '').slice(0, 2)">
                    <input type="text" id="dayInput" placeholder="روز" inputmode="numeric" maxlength="2" 
                           onkeypress="return onlyNumbers(event)" 
                           oninput="this.value = this.value.replace(/[^0-9]/g, '').slice(0, 2)">
                </div>
            </div>

            <div class="form-group">
                <label>نام مشتری</label>
                <input type="text" id="customerName" placeholder="نام مشتری">
            </div>

            <div class="form-group">
                <label>شماره مشتری</label>
                <input type="tel" id="customerPhone" placeholder="شماره تماس مشتری">
            </div>

            <div class="toggle-container">
                <span class="toggle-label">ساخت رسید با <strong id="toggleStatusText">نام فروشگاه</strong></span>
                <label class="ios-toggle">
                    <input type="checkbox" id="shopNameToggle" checked onchange="updateToggleText()">
                    <span class="slider"></span>
                </label>
            </div>

            <button class="submit-btn" onclick="previewAndDownload()">📄 پیش‌نمایش و دانلود PDF</button>
        </div>
    </div>

    <script>
        let shopInfo = { name: '', phone: '' };
        let productCounter = 0;

        function onlyNumbers(event) {
            const charCode = event.which ? event.which : event.keyCode;
            if (charCode > 31 && (charCode < 48 || charCode > 57)) return false;
            return true;
        }

        function login() {
            const name = document.getElementById('shopNameInput').value.trim();
            const phone = document.getElementById('shopPhoneInput').value.trim();
            if (!name || !phone) { alert('لطفاً تمام فیلدها را پر کنید!'); return; }
            shopInfo.name = name;
            shopInfo.phone = phone;
            document.getElementById('loginOverlay').style.display = 'none';
            document.getElementById('mainContainer').style.display = 'block';
            const welcomeMsg = document.getElementById('welcomeMsg');
            welcomeMsg.textContent = `👋 ${name} عزیز، خوش آمدید!`;
            welcomeMsg.style.display = 'block';
            welcomeMsg.style.animation = 'none';
            welcomeMsg.offsetHeight;
            welcomeMsg.style.animation = 'fadeInOut 2s ease forwards';
            setTimeout(() => { welcomeMsg.style.display = 'none'; }, 2000);
        }

        function openShopInfo() {
            document.getElementById('shopInfoModal').classList.add('active');
            document.getElementById('shopNameDisplay').textContent = '🏪 ' + shopInfo.name;
            document.getElementById('shopPhoneDisplay').textContent = shopInfo.phone;
        }

        function closeShopInfo() {
            document.getElementById('shopInfoModal').classList.remove('active');
        }

        function openInvoicePage() {
            document.getElementById('mainContainer').style.display = 'none';
            document.getElementById('invoicePage').style.display = 'block';
            document.getElementById('shopInfoModal').classList.remove('active');
            if (productCounter === 0) addProduct();
        }

        function backToMain() {
            document.getElementById('invoicePage').style.display = 'none';
            document.getElementById('mainContainer').style.display = 'block';
        }

        function addProduct() {
            productCounter++;
            const container = document.getElementById('productsContainer');
            const productRow = document.createElement('div');
            productRow.className = 'product-row';
            productRow.id = `product-${productCounter}`;
            productRow.innerHTML = `
                <div class="form-group">
                    <label>نام محصول ${productCounter}</label>
                    <input type="text" class="product-name" placeholder="نام محصول" required>
                </div>
                <div class="form-group">
                    <label>قیمت (تومان)</label>
                    <input type="text" class="product-price" placeholder="قیمت" inputmode="numeric" 
                           onkeypress="return onlyNumbers(event)" 
                           oninput="this.value = this.value.replace(/[^0-9]/g, '')" required>
                </div>
                <div class="form-group">
                    <label>تعداد</label>
                    <input type="text" class="product-quantity" placeholder="تعداد" inputmode="numeric" 
                           onkeypress="return onlyNumbers(event)" 
                           oninput="this.value = this.value.replace(/[^0-9]/g, '')" required>
                </div>
                ${productCounter > 1 ? `<button class="delete-btn" onclick="removeProduct(${productCounter})">🗑️ حذف</button>` : ''}
            `;
            container.appendChild(productRow);
        }

        function removeProduct(id) {
            const productRow = document.getElementById(`product-${id}`);
            if (productRow) productRow.remove();
        }

        function generateInvoiceNumber() {
            document.getElementById('invoiceNumber').value = Math.floor(10000 + Math.random() * 90000);
        }

        function generateOrderNumber() {
            document.getElementById('orderNumber').value = Math.floor(100000 + Math.random() * 900000);
        }

        function updateToggleText() {
            const toggle = document.getElementById('shopNameToggle');
            const statusText = document.getElementById('toggleStatusText');
            statusText.textContent = toggle.checked ? 'نام فروشگاه' : 'بدون نام فروشگاه';
        }

        function previewAndDownload() {
            const productNames = document.querySelectorAll('.product-name');
            const productPrices = document.querySelectorAll('.product-price');
            const productQuantities = document.querySelectorAll('.product-quantity');
            const products = [];
            let hasError = false;

            for (let i = 0; i < productNames.length; i++) {
                const name = productNames[i].value.trim();
                const price = productPrices[i].value;
                const quantity = productQuantities[i].value;
                if (!name || !price || !quantity) {
                    alert(`لطفاً اطلاعات محصول ${i + 1} را کامل وارد کنید!`);
                    hasError = true;
                    break;
                }
                products.push({
                    name: name,
                    price: parseInt(price),
                    quantity: parseInt(quantity),
                    total: parseInt(price) * parseInt(quantity)
                });
            }

            if (hasError || products.length === 0) return;

            let invoiceNumber = document.getElementById('invoiceNumber').value;
            let orderNumber = document.getElementById('orderNumber').value;
            const year = document.getElementById('yearInput').value;
            const month = document.getElementById('monthInput').value;
            const day = document.getElementById('dayInput').value;
            const customerName = document.getElementById('customerName').value.trim();
            const customerPhone = document.getElementById('customerPhone').value.trim();
            const useShopName = document.getElementById('shopNameToggle').checked;

            if (!invoiceNumber || invoiceNumber.length !== 5) { alert('شماره فاکتور باید ۵ رقمی باشد!'); return; }
            if (!orderNumber || orderNumber.length !== 6) { alert('شماره سفارش باید ۶ رقمی باشد!'); return; }
            if (!year || !month || !day || year.length !== 4 || month < 1 || month > 12 || day < 1 || day > 31) {
                alert('تاریخ را به درستی وارد کنید!');
                return;
            }

            const totalAmount = products.reduce((sum, p) => sum + p.total, 0);
            const dateStr = `${year}/${month.padStart(2, '0')}/${day.padStart(2, '0')}`;

            // ساخت HTML رسید
            let productsHTML = '';
            products.forEach((product, index) => {
                productsHTML += `
                    <tr>
                        <td>${index + 1}</td>
                        <td style="text-align: right;">${product.name}</td>
                        <td>${product.quantity}</td>
                        <td>${product.price.toLocaleString()} تومان</td>
                        <td>${product.total.toLocaleString()} تومان</td>
                    </tr>
                `;
            });

            let customerInfo = '---';
            if (customerName && customerPhone) {
                customerInfo = `${customerName} - ${customerPhone}`;
            } else if (customerName) {
                customerInfo = customerName;
            } else if (customerPhone) {
                customerInfo = customerPhone;
            }

            const receiptHTML = `
                <div id="invoice-receipt" style="display:block;background:#ffffff;padding:30px;max-width:500px;margin:30px auto;font-family:Tahoma,Arial,sans-serif;direction:rtl;border:3px solid #000;color:#000;position:relative;">
                    <div style="text-align:center;border-bottom:3px solid #000;padding-bottom:20px;margin-bottom:20px;">
                        <h2 style="font-size:26px;margin-bottom:10px;color:#000;font-weight:bold;">${useShopName ? shopInfo.name : 'رسید فروش'}</h2>
                        <div style="font-size:18px;color:#000;margin-top:5px;font-weight:bold;">${useShopName ? '📞 ' + shopInfo.phone : ''}</div>
                    </div>
                    <table style="width:100%;border-collapse:collapse;margin-bottom:20px;">
                        <tr>
                            <td style="padding:12px 8px;border-bottom:2px solid #000;font-size:16px;color:#000;font-weight:bold;width:40%;text-align:right;background:#f0f0f0;padding-right:10px;">شماره فاکتور:</td>
                            <td style="padding:12px 8px;border-bottom:2px solid #000;font-size:16px;color:#000;text-align:left;direction:ltr;padding-left:10px;">${invoiceNumber}</td>
                        </tr>
                        <tr>
                            <td style="padding:12px 8px;border-bottom:2px solid #000;font-size:16px;color:#000;font-weight:bold;width:40%;text-align:right;background:#f0f0f0;padding-right:10px;">شماره سفارش:</td>
                            <td style="padding:12px 8px;border-bottom:2px solid #000;font-size:16px;color:#000;text-align:left;direction:ltr;padding-left:10px;">${orderNumber}</td>
                        </tr>
                        <tr>
                            <td style="padding:12px 8px;border-bottom:2px solid #000;font-size:16px;color:#000;font-weight:bold;width:40%;text-align:right;background:#f0f0f0;padding-right:10px;">تاریخ:</td>
                            <td style="padding:12px 8px;border-bottom:2px solid #000;font-size:16px;color:#000;text-align:left;direction:ltr;padding-left:10px;">${dateStr}</td>
                        </tr>
                        <tr>
                            <td style="padding:12px 8px;border-bottom:2px solid #000;font-size:16px;color:#000;font-weight:bold;width:40%;text-align:right;background:#f0f0f0;padding-right:10px;">مشتری:</td>
                            <td style="padding:12px 8px;border-bottom:2px solid #000;font-size:16px;color:#000;text-align:left;direction:ltr;padding-left:10px;">${customerInfo}</td>
                        </tr>
                    </table>
                    <h3 style="text-align:center;margin:20px 0 10px;color:#000;">🛒 محصولات</h3>
                    <table style="width:100%;border-collapse:collapse;margin:20px 0;">
                        <thead>
                            <tr>
                                <th style="background:#000;color:#fff;padding:12px 8px;font-size:15px;border:2px solid #000;text-align:center;">ردیف</th>
                                <th style="background:#000;color:#fff;padding:12px 8px;font-size:15px;border:2px solid #000;text-align:center;">نام محصول</th>
                                <th style="background:#000;color:#fff;padding:12px 8px;font-size:15px;border:2px solid #000;text-align:center;">تعداد</th>
                                <th style="background:#000;color:#fff;padding:12px 8px;font-size:15px;border:2px solid #000;text-align:center;">قیمت واحد</th>
                                <th style="background:#000;color:#fff;padding:12px 8px;font-size:15px;border:2px solid #000;text-align:center;">قیمت کل</th>
                            </tr>
                        </thead>
                        <tbody>
                            ${productsHTML}
                        </tbody>
                    </table>
                    <div style="text-align:center;font-size:22px;font-weight:bold;margin-top:25px;padding:20px;background:#000;color:#fff;border:3px solid #000;border-radius:5px;">
                        💰 مبلغ قابل پرداخت: <span style="color:#fff;font-size:24px;">${totalAmount.toLocaleString()} تومان</span>
                    </div>
                    <div style="text-align:center;margin-top:25px;padding-top:15px;border-top:2px solid #000;font-size:14px;color:#000;">
                        با تشکر از خرید شما - به امید دیدار مجدد
                    </div>
                </div>
            `;

            // ایجاد پنجره جدید برای پیش‌نمایش و دانلود
            const printWindow = window.open('', '_blank', 'width=600,height=800');
            printWindow.document.write(`
                <!DOCTYPE html>
                <html lang="fa" dir="rtl">
                <head>
                    <meta charset="UTF-8">
                    <title>پیش‌نمایش فاکتور</title>
                    <style>
                        body { 
                            font-family: Tahoma, Arial, sans-serif; 
                            background: #f0f0f0; 
                            padding: 20px;
                            direction: rtl;
                        }
                        @media print {
                            body { background: white; padding: 0; }
                        }
                    </style>
                </head>
                <body>
                    ${receiptHTML}
                </body>
                </html>
            `);
            printWindow.document.close();
            
            // کمی صبر می‌کنیم تا渲染 کامل شود سپس PDF می‌سازیم
            setTimeout(() => {
                const receiptElement = printWindow.document.getElementById('invoice-receipt');
                
                html2canvas(receiptElement, {
                    scale: 2,
                    useCORS: true,
                    backgroundColor: '#ffffff',
                    allowTaint: true,
                    logging: false
                }).then(canvas => {
                    const imgData = canvas.toDataURL('image/jpeg', 1.0);
                    const { jsPDF } = window.jspdf;
                    const pdf = new jsPDF('p', 'mm', 'a4');
                    
                    const imgWidth = 210; // A4 width
                    const imgHeight = (canvas.height * imgWidth) / canvas.width;
                    
                    pdf.addImage(imgData, 'JPEG', 0, 0, imgWidth, imgHeight);
                    pdf.save(`فاکتور-${invoiceNumber}.pdf`);
                    
                    alert('✅ فاکتور با موفقیت ذخیره شد!');
                }).catch(error => {
                    console.error('خطا:', error);
                    alert('⚠️ خطا در ساخت PDF. لطفاً دوباره تلاش کنید.');
                });
            }, 1000);
        }

        document.getElementById('shopInfoModal').addEventListener('click', function(e) {
            if (e.target === this) closeShopInfo();
        });
    </script>
</body>
</html>
